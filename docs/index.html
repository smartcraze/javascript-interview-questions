<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>JavaScript Interview Sheets</title>
    <meta name="description" content="Minimal responsive black-theme sheet viewer for JavaScript interview questions." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#sheetContent">Skip to content</a>

    <main class="app-shell" id="top">
      <aside class="sheet-pane" aria-label="Question sheets">
        <header class="sheet-head">
          <p class="eyebrow">Knowledge Board</p>
          <h1>JS Interview Sheets</h1>
          <p class="sheet-meta" id="sheetMeta">Loading...</p>
          <label for="searchInput">Search Sheets</label>
          <input
            id="searchInput"
            name="sheet-search"
            type="search"
            placeholder="Search by topic or keyword..."
            autocomplete="off"
          />
        </header>

        <ul id="sheetList" class="sheet-list" aria-label="All question sheets"></ul>
      </aside>

      <section class="content-pane" id="sheetContent" aria-live="polite">
        <header class="content-head">
          <p id="activeQuestionNumber" class="question-number">Question #</p>
          <h2 id="activeQuestionTitle">Select a sheet from the left side</h2>
          <a
            id="sourceLink"
            class="source-link"
            href="https://github.com/sudheerj/javascript-interview-questions/blob/master/README.md"
            target="_blank"
            rel="noreferrer"
          >
            Open source reference
          </a>
        </header>
        <article id="answerContent" class="answer-content">
          <p>All content will appear here after selecting a sheet.</p>
        </article>
      </section>
    </main>

    <div class="floating-nav" aria-label="Question navigation">
      <button id="prevFloatingBtn" type="button" aria-label="Previous question">Previous</button>
      <button id="nextFloatingBtn" type="button" aria-label="Next question">Next</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
